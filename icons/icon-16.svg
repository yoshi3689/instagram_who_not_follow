<svg width="16" height="16" viewBox="0 0 16 16"
  xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="orange16" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E65100"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>
  </defs>

  <!-- Centered and optically balanced for 16px -->
  <g transform="translate(8,8) scale(0.95)" fill="url(#orange16)">

    <!-- Head -->
    <circle cx="0" cy="-5" r="3.2" />

    <!-- Body (extended close to bottom edge) -->
    <path d="M -7 2
             Q -7 -1 0 -1
             T 7 2
             L 7 7
             L -7 7
             Z" />

    <!-- Simplified Magnifier (thicker for clarity at 16px) -->
    <g transform="translate(4,-3)">
      <circle cx="0" cy="0" r="2.5"/>
      <rect x="2" y="2" width="4" height="1.8" rx="0.8" transform="rotate(45 2 2)" />
    </g>

  </g>

</svg>